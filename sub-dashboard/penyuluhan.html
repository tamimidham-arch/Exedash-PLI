<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Penyuluhan - Monitoring Edukasi & Kepuasan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, background: #f5f7fb; padding: 24px 20px; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header { background: linear-gradient(135deg, #1b5e20, #0a3b0f); color: white; padding: 24px 28px; border-radius: 28px; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 12px; }
        .status-badge { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 40px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 8px; }
        .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 18px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .back-btn:hover { background: rgba(255,255,255,0.35); }
        
        /* KPI Row */
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px; }
        .kpi-card { background: white; border-radius: 24px; padding: 20px; text-align: center; border-top: 4px solid; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .kpi-value { font-size: 32px; font-weight: 800; color: #1e2f4e; }
        .kpi-label { color: #5a6874; font-weight: 500; margin-top: 8px; font-size: 13px; }
        
        /* Grid Layouts */
        .row-3cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 28px; }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); display: flex; flex-direction: column; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 16px; border-bottom: 2px solid #eef2f6; padding-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .card-header h3 { font-size: 1.2rem; font-weight: 700; color: #1f3b4c; display: flex; align-items: center; gap: 8px; }
        
        /* Activities & Timeline */
        .activity-list { display: flex; flex-direction: column; gap: 12px; }
        .activity-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #f8fafc; border-radius: 16px; border-left: 4px solid; }
        .activity-name { font-weight: 600; font-size: 14px; }
        .activity-count { font-weight: 800; font-size: 20px; color: #2e7d32; }

        .timeline-item { position: relative; padding-bottom: 18px; padding-left: 24px; border-left: 3px solid #c8e6d9; margin-left: 8px; }
        .timeline-item::before { content: ''; position: absolute; left: -8px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: #2e7d32; }
        .timeline-date { font-size: 11px; color: #5f7d6b; font-weight: 600; }
        .timeline-event { font-weight: 700; margin: 4px 0; font-size: 14px; }
        .timeline-impact { font-size: 11px; color: #2b7a3e; background: #e9f5ec; display: inline-block; padding: 2px 10px; border-radius: 20px; margin-top: 6px; }

        /* Tables */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #e9edf2; }
        th { background: #f8fafc; font-weight: 700; color: #2c5e6e; }
        
        .progress-badge { background: #e0f2e9; color: #1c6e3c; padding: 4px 12px; border-radius: 40px; font-size: 12px; font-weight: 600; }
        .deadline-alert { background: #fff3e0; color: #e68a2e; padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: 600; }

        .skm-timeline-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; }
        .full-width-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); height: 100%; }
        .timeline-scroll { max-height: 380px; overflow-y: auto; padding-top: 10px; }

        @media (max-width: 1000px) { .kpi-row { grid-template-columns: repeat(2, 1fr); } .row-3cols, .skm-timeline-wrapper { grid-template-columns: 1fr; } }
        .loader { text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div>
                <h1><i class="fas fa-chalkboard-user"></i> Dashboard Penyuluhan & Edukasi</h1>
                <div style="font-size: 13px; opacity: 0.9;" id="period-info">Sinkronisasi data...</div>
            </div>
            <div style="display: flex; gap: 12px;">
                <span id="data-status" class="status-badge"><i class="fas fa-sync-alt"></i> Memuat...</span>
                <button class="back-btn" onclick="window.location.href='../index.html'"><i class="fas fa-arrow-left"></i> Kembali</button>
            </div>
        </div>
        <div id="dashboard-content"><div class="loader"><i class="fas fa-spinner fa-pulse"></i> Menghubungkan ke database...</div></div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbywHucFlh5aJAPbVMUWGA_REGi9lrax2IjYMbPtHJoMTIYqIriHeRFnjygQMbICNJphhg/exec';
        
        let dataPenyuluhan = [];
        let dataSKM = [];
        let dataCVC = [];

        async function fetchAllData() {
            try {
                const [pRes, sRes, cRes] = await Promise.all([
                    fetch(`${API_URL}?sheet=PENYULUHAN`).then(r => r.json()),
                    fetch(`${API_URL}?sheet=SKM`).then(r => r.json()),
                    fetch(`${API_URL}?sheet=CVC`).then(r => r.json())
                ]);

                dataPenyuluhan = processSheetData(pRes);
                dataSKM = processSheetData(sRes);
                dataCVC = processSheetData(cRes);

                document.getElementById('data-status').innerHTML = '<i class="fas fa-check-circle"></i> Data Sinkron';
                renderDashboard();
            } catch (e) {
                console.error("Gagal memuat data:", e);
                document.getElementById('dashboard-content').innerHTML = '<div class="loader">Terjadi kesalahan koneksi data.</div>';
            }
        }

        function processSheetData(res) {
            if (!res || !res.data || res.data.length < 2) return [];
            const headers = res.data[0];
            return res.data.slice(1).filter(r => r[0]).map(r => {
                let obj = {};
                headers.forEach((h, i) => { if (h) obj[h.trim()] = r[i]; });
                return obj;
            });
        }

        function renderDashboard() {
            // --- LOGIKA PERBAIKAN: MENCARI SKM TERBARU YANG SUDAH TERISI ---
            const skmTerisi = dataSKM.filter(item => item.SKM_Nilai && item.SKM_Nilai !== "");
            const skmTerbaru = skmTerisi.length > 0 ? skmTerisi[skmTerisi.length - 1] : { SKM_Nilai: "-", Triwulan: "-" };

            const totalPeserta = dataPenyuluhan.reduce((s, i) => s + (parseInt(i.Total_Peserta) || 0), 0);
            const avgEfektivitas = (dataPenyuluhan.reduce((s, i) => s + (parseFloat(i.Indeks_Efektivitas) || 0), 0) / (dataPenyuluhan.length || 1)).toFixed(2);
            const totalCVC = dataCVC.reduce((s, i) => s + (parseInt(i.Total_Kunjungan) || 0), 0);

            const html = `
                <div class="kpi-row">
                    <div class="kpi-card" style="border-top-color:#2e7d32;">
                        <div class="kpi-value">${totalPeserta.toLocaleString()}</div>
                        <div class="kpi-label">Total Peserta YTD</div>
                    </div>
                    <div class="kpi-card" style="border-top-color:#1976d2;">
                        <div class="kpi-value">${avgEfektivitas}</div>
                        <div class="kpi-label">Rata-rata Efektivitas (%)</div>
                    </div>
                    <div class="kpi-card" style="border-top-color:#ff9800;">
                        <div class="kpi-value" id="kpi-skm-val">${skmTerbaru.SKM_Nilai}</div>
                        <div class="kpi-label">SKM Terbaru (Triwulan ${skmTerbaru.Triwulan})</div>
                    </div>
                    <div class="kpi-card" style="border-top-color:#00acc1;">
                        <div class="kpi-value">${totalCVC}</div>
                        <div class="kpi-label">Total CVC Kunjungan</div>
                    </div>
                </div>

                <div class="row-3cols">
                    <div class="card">
                        <div class="card-header"><h3><i class="fas fa-chalkboard"></i> Sosialisasi</h3></div>
                        <canvas id="sosialisasiChart" style="height:200px;"></canvas>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3><i class="fas fa-handshake"></i> Intimacy</h3></div>
                        <div class="activity-list" id="intimacyList"></div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3><i class="fas fa-building"></i> Topik CVC</h3></div>
                        <canvas id="cvcChart" style="height:200px;"></canvas>
                    </div>
                </div>

                <div class="skm-timeline-wrapper">
                    <div class="full-width-card">
                        <div class="card-header"><h3><i class="fas fa-poll"></i> Tabel SKM</h3><span class="deadline-alert">Deadline: 7 hari awal bulan</span></div>
                        <div class="table-wrapper">
                            <table>
                                <thead><tr><th>Triwulan</th><th>Nilai</th><th>Status</th><th>Keterangan Log</th></tr></thead>
                                <tbody id="skmTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="full-width-card">
                        <div class="card-header"><h3><i class="fas fa-history"></i> Lini Masa</h3></div>
                        <div class="timeline-scroll" id="timelineList"></div>
                    </div>
                </div>
            `;
            document.getElementById('dashboard-content').innerHTML = html;
            
            renderCharts();
            renderTableSKM();
            renderLists();
        }

        function renderTableSKM() {
            const body = document.getElementById('skmTableBody');
            body.innerHTML = dataSKM.map(s => {
                // Deteksi status berdasarkan isi kolom Deadline_Terpenuhi
                const isDone = s.Deadline_Terpenuhi && s.Deadline_Terpenuhi.toString().includes("Sudah");
                return `
                    <tr>
                        <td>Triwulan ${s.Triwulan} ${s.Tahun}</td>
                        <td><strong>${s.SKM_Nilai || '-'}</strong></td>
                        <td><span class="${isDone ? 'progress-badge' : 'deadline-alert'}">${isDone ? '✓ Terinput' : '⚠️ Belum'}</span></td>
                        <td style="font-size:11px; color:#666;">${s.Deadline_Terpenuhi || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderLists() {
            // Render Intimacy
            const intm = {
                Code: dataPenyuluhan.reduce((s, i) => s + (parseInt(i.Intimacy_CodeMorning) || 0), 0),
                Gathering: dataPenyuluhan.reduce((s, i) => s + (parseInt(i.Intimacy_Gathering) || 0), 0),
                FKP: dataPenyuluhan.reduce((s, i) => s + (parseInt(i.Intimacy_FKP) || 0), 0)
            };
            document.getElementById('intimacyList').innerHTML = `
                <div class="activity-item" style="border-left-color:#2e7d32;"><span class="activity-name">Code Morning</span><span class="activity-count">${intm.Code}</span></div>
                <div class="activity-item" style="border-left-color:#ff9800;"><span class="activity-name">Gathering</span><span class="activity-count">${intm.Gathering}</span></div>
                <div class="activity-item" style="border-left-color:#1976d2;"><span class="activity-name">FKP</span><span class="activity-count">${intm.FKP}</span></div>
            `;

            // Render Timeline
            document.getElementById('timelineList').innerHTML = dataPenyuluhan.slice(-5).reverse().map(item => `
                <div class="timeline-item">
                    <div class="timeline-date">${item.Bulan} ${item.Tahun}</div>
                    <div class="timeline-event">${item.Total_Peserta} Peserta - Efektivitas ${item.Indeks_Efektivitas}%</div>
                    <div class="timeline-impact">PMI: ${item.PMI} | UMKM: ${item.UMKM}</div>
                </div>
            `).join('');
        }

        function renderCharts() {
            const ctxSos = document.getElementById('sosialisasiChart').getContext('2d');
            new Chart(ctxSos, {
                type: 'bar',
                data: {
                    labels: ['PMI', 'UMKM', 'DBHCT', 'Aturan'],
                    datasets: [{
                        label: 'Giat',
                        data: [
                            dataPenyuluhan.reduce((s, i) => s + (parseInt(i.PMI) || 0), 0),
                            dataPenyuluhan.reduce((s, i) => s + (parseInt(i.UMKM) || 0), 0),
                            dataPenyuluhan.reduce((s, i) => s + (parseInt(i.DBHCT) || 0), 0),
                            dataPenyuluhan.reduce((s, i) => s + (parseInt(i.Peraturan) || 0), 0)
                        ],
                        backgroundColor: ['#2e7d32', '#ff9800', '#1976d2', '#9c27b0']
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });

            const ctxCVC = document.getElementById('cvcChart').getContext('2d');
            new Chart(ctxCVC, {
                type: 'doughnut',
                data: {
                    labels: ['PMI', 'UMKM', 'Aturan'],
                    datasets: [{
                        data: [
                            dataCVC.reduce((s, i) => s + (parseInt(i.Topik_PMI) || 0), 0),
                            dataCVC.reduce((s, i) => s + (parseInt(i.Topik_UMKM) || 0), 0),
                            dataCVC.reduce((s, i) => s + (parseInt(i.Topik_Peraturan) || 0), 0)
                        ],
                        backgroundColor: ['#2e7d32', '#ff9800', '#1976d2']
                    }]
                }
            });
        }

        fetchAllData();
    </script>
</body>
</html>
